name: Weekly Intelligence

on:

  workflow_dispatch:

  schedule:

    - cron: "0 7 * * 1"

permissions:

  contents: write

jobs:

  intelligence:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5

      with:

        python-version: "3.12"

    - run: |

        pip install feedparser

    - run: |

        python scripts/fetch_news.py

    - run: |

        mkdir -p reports

        cp weekly_report.md reports/$(date +%F).md

    - run: |

        python scripts/generate_index.py

    - name: Commit changes

      run: |

        git config user.name github-actions

        git config user.email github-actions@github.com

        git add reports

        git add index.html

        git commit -m "Weekly Intelligence $(date +%F)" || exit 0

        git push

    - uses: actions/upload-artifact@v4

      with:

        name: weekly-report

        path: weekly_report.md
